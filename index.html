<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5ifty6ix Network Solution</title>
    <style>
        /* Premium Dark Theme CSS */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #0f172a; /* Deep navy/black background */
            color: #f8fafc;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        .header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            border-bottom: 1px solid #334155;
        }
        .header h1 {
            margin: 0;
            font-size: 3em;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        .header p {
            color: #94a3b8;
            font-size: 1.2em;
            margin-top: 10px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .category-title {
            font-size: 1.5em;
            color: #f1f5f9;
            margin-top: 50px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }
        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 30px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
            border-color: #475569;
        }
        .card h3 {
            margin: 0 0 15px 0;
            font-size: 1.4em;
            color: #f8fafc;
        }
        .price-badge {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #38bdf8;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        .features {
            list-style: none;
            padding: 0;
            margin: 0 0 30px 0;
            flex-grow: 1;
        }
        .features li {
            padding: 8px 0;
            border-bottom: 1px solid #334155;
            color: #cbd5e1;
            font-size: 0.95em;
            display: flex;
            align-items: center;
        }
        .features li::before {
            content: "✓";
            color: #10b981;
            font-weight: bold;
            margin-right: 10px;
        }
        .features li:last-child {
            border-bottom: none;
        }
        .cta-btn {
            display: block;
            text-align: center;
            background-color: #3b82f6;
            color: white;
            padding: 14px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .cta-btn:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>5ifty6ix Network</h1>
        <p>Premium Routing, CGNAT Bypass & Gaming Solutions</p>
    </div>

    <div class="container" id="pricing-container">
        <p style="text-align: center; color: #94a3b8;">Loading latest packages...</p>
    </div>

    <script>
        // This script fetches the data from data.json and builds the website
        const telegramLink = "YOUR_TELEGRAM_LINK_HERE"; // Put your inbox link here

        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('pricing-container');
                container.innerHTML = ''; // Clear the "Loading" text

                data.categories.forEach(category => {
                    // Create Category Title
                    const title = document.createElement('h2');
                    title.className = 'category-title';
                    title.textContent = category.title;
                    container.appendChild(title);

                    // Create Grid for this Category
                    const grid = document.createElement('div');
                    grid.className = 'grid';

                    // Create Cards
                    category.packages.forEach(pkg => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.style.borderTop = `4px solid ${category.themeColor}`;

                        // Build the features list
                        const featuresHTML = pkg.features.map(f => `<li>${f}</li>`).join('');

                        card.innerHTML = `
                            <h3>${pkg.name}</h3>
                            <div class="price-badge">${pkg.price}</div>
                            <ul class="features">
                                ${featuresHTML}
                            </ul>
                            <a href="${telegramLink}" class="cta-btn">Order via Inbox</a>
                        `;
                        grid.appendChild(card);
                    });

                    container.appendChild(grid);
                });
            })
            .catch(error => {
                console.error("Error loading pricing data:", error);
                document.getElementById('pricing-container').innerHTML = 
                    "<p style='text-align:center; color:#ef4444;'>Error loading packages. Please refresh the page.</p>";
            });
    </script>
</body>
</html>
